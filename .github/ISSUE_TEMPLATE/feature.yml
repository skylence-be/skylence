name: Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Workflow Engine
        - WebSocket / Streaming
        - API
        - Webhooks
        - Configuration
        - Installation / Update
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered?
